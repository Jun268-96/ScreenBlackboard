<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>한글 입력 검증 테스트</title>
  <style>
    body { font-family: 'Malgun Gothic', sans-serif; margin: 20px; background: #262626; color: #fff; }
    .test-area { 
      border: 2px solid #444; 
      padding: 20px; 
      min-height: 150px; 
      background: #1a1a1a;
      font-size: 48px;
      margin: 10px 0;
    }
    .controls { 
      margin: 20px 0; 
      display: flex; 
      gap: 10px; 
      align-items: center;
      flex-wrap: wrap;
    }
    button { 
      padding: 8px 16px; 
      background: #4d94ff; 
      color: white; 
      border: none; 
      border-radius: 4px;
      cursor: pointer;
    }
    button:hover { background: #3d84ef; }
    button.active { background: #ff6b35; }
    .test-case { 
      background: #333; 
      padding: 15px; 
      margin: 10px 0; 
      border-radius: 5px;
    }
    .pass { border-left: 5px solid #4CAF50; }
    .fail { border-left: 5px solid #f44336; }
    .status { font-weight: bold; }
  </style>
</head>
<body>
  <h1>🔧 한글 입력 검증 테스트</h1>
  
  <div class="controls">
    <button id="boldBtn">굵게</button>
    <button id="colorBtn" onclick="setRedColor()">빨간색</button>
    <button id="sizeBtn" onclick="setBigSize()">큰 글자</button>
    <button onclick="runAutoTest()">자동 테스트 실행</button>
    <button onclick="clearArea()">초기화</button>
  </div>
  
  <div class="test-area" contenteditable="true" id="testArea">
    한글을 입력해보세요
  </div>
  
  <div id="results"></div>

  <script src="./src/text-formatter.js"></script>
  <script>
    const textFormatter = new SimpleTextFormatter();
    const testArea = document.getElementById('testArea');
    const boldBtn = document.getElementById('boldBtn');
    const results = document.getElementById('results');
    
    let testResults = [];
    
    // Setup event listeners
    testArea.addEventListener('input', (e) => {
      textFormatter.handleInput(e);
    });
    
    testArea.addEventListener('compositionstart', (e) => {
      textFormatter.handleCompositionStart(e);
    });
    
    testArea.addEventListener('compositionupdate', (e) => {
      textFormatter.handleCompositionUpdate(e);
    });
    
    testArea.addEventListener('compositionend', (e) => {
      textFormatter.handleCompositionEnd(e);
    });
    
    boldBtn.addEventListener('click', () => {
      textFormatter.toggleFormat(testArea, 'fontWeight');
      updateButtonStates();
    });
    
    function setRedColor() {
      textFormatter.setColor(testArea, '#ff0000');
    }
    
    function setBigSize() {
      textFormatter.setFontSize(testArea, 72);
    }
    
    function updateButtonStates() {
      const format = textFormatter.getCurrentFormat(testArea);
      boldBtn.classList.toggle('active', format.fontWeight === 'bold');
    }
    
    function clearArea() {
      testArea.innerHTML = '';
      testFormatter = new SimpleTextFormatter();
      testArea.dataset.currentFormat = JSON.stringify(textFormatter.currentFormat);
      testArea.focus();
    }
    
    function addTestResult(testName, success, details = '') {
      testResults.push({ testName, success, details });
      displayResults();
    }
    
    function displayResults() {
      let html = '<h3>🧪 테스트 결과</h3>';
      testResults.forEach(result => {
        const status = result.success ? '✅ PASS' : '❌ FAIL';
        const cssClass = result.success ? 'pass' : 'fail';
        html += `<div class="test-case ${cssClass}">
          <div class="status">${status} ${result.testName}</div>
          ${result.details ? `<div>${result.details}</div>` : ''}
        </div>`;
      });
      results.innerHTML = html;
    }
    
    async function runAutoTest() {
      testResults = [];
      clearArea();
      
      // Test 1: Basic Korean input
      testArea.focus();
      addTestResult('기본 한글 입력', true, '수동으로 "안녕하세요"를 입력해주세요');
      
      // Test 2: Composition state tracking
      const composingTest = textFormatter.isComposing === false;
      addTestResult('초기 composition 상태', composingTest, `isComposing: ${textFormatter.isComposing}`);
      
      // Test 3: Format application
      textFormatter.setColor(testArea, '#ff0000');
      textFormatter.setFontSize(testArea, 64);
      const formatData = testArea.dataset.currentFormat;
      const formatTest = formatData && formatData.includes('#ff0000');
      addTestResult('서식 설정', formatTest, `Format data: ${formatData}`);
      
      // Test 4: getCurrentFormat function
      try {
        const currentFormat = textFormatter.getCurrentFormat(testArea);
        const getCurrentTest = currentFormat && typeof currentFormat === 'object';
        addTestResult('현재 서식 감지', getCurrentTest, `Color: ${currentFormat.color}, Size: ${currentFormat.fontSize}`);
      } catch (error) {
        addTestResult('현재 서식 감지', false, `Error: ${error.message}`);
      }
      
      // Test 5: IME event handlers
      const hasHandlers = 
        typeof textFormatter.handleCompositionStart === 'function' &&
        typeof textFormatter.handleCompositionUpdate === 'function' &&
        typeof textFormatter.handleCompositionEnd === 'function';
      addTestResult('IME 이벤트 핸들러', hasHandlers, 'compositionstart, compositionupdate, compositionend 메서드 존재');
      
      // Test 6: Error handling
      try {
        testFormatter.handleInput({ target: null, inputType: 'insertText' });
        addTestResult('에러 처리', true, 'null target에 대한 안전한 처리');
      } catch (error) {
        addTestResult('에러 처리', false, `Null target 처리 실패: ${error.message}`);
      }
      
      displayResults();
    }
    
    // Manual test instructions
    function showInstructions() {
      alert(`
수동 테스트 지침:

1. '굵게' 버튼을 클릭하고 한글을 입력해보세요
2. '빨간색' 버튼을 클릭하고 한글을 입력해보세요  
3. '큰 글자' 버튼을 클릭하고 한글을 입력해보세요
4. 기존 한글 텍스트를 선택하고 서식을 변경해보세요

예상 결과:
- 한글 입력 중 서식이 중간에 끊기지 않아야 함
- 완성된 한글에 서식이 정확히 적용되어야 함
- 텍스트 선택 후 서식 변경이 정상 작동해야 함
      `);
    }
    
    // Initialize
    testArea.dataset.currentFormat = JSON.stringify(textFormatter.currentFormat);
    
    // Show instructions on load
    setTimeout(showInstructions, 1000);
  </script>
</body>
</html>
